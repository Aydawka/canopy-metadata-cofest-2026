  Acknowledgment Statement:
    value: "This is a fully synthetic pilot study (SPbE-2026), sponsored by the Synthetic Data Working Group, Canopy Project, created for the ISMB/ECCB CollaborationFest AI-assisted metadata generation exercise. No human subjects were enrolled and no real data are reported; no real funding source is acknowledged. [SYNTHETIC PLACEHOLDER — no acknowledgment text was provided in the source documents]"
  Study Description:
    value: "A two-arm, parallel-group, randomized pilot trial evaluating whether a 10-hour time-restricted eating (TRE) window improves glycemic control, relative to habitual eating, in adults aged 40-65 with prediabetes. Forty participants were enrolled 1:1 across four sites (United States, Germany, Spain, Canada) and followed for 12 weeks. The primary endpoint is change in fasting plasma glucose from baseline to week 12; secondary endpoints include HbA1c, body weight/BMI, systolic blood pressure, adherence, and safety. As a pilot, the study is not powered for confirmatory hypothesis testing but is intended to estimate effect sizes and feasibility to inform a larger confirmatory trial. All data in this submission are synthetic and fictional, generated for the ISMB/ECCB CollaborationFest AI-assisted metadata generation exercise (protocol SPbE-2026, v1.0)."
